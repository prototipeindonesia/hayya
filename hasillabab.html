<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAYYA - Data Laboratorium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0984E3; --white: #ffffff; --text-dark: #2D3436; --soft-bg: #F8F9FD; --danger: #993C1D; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #DFE6E9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-frame { width: 375px; height: 780px; background-color: var(--soft-bg); border: 10px solid #2D3436; border-radius: 45px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 55px 25px 20px; background: var(--white); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #F1F2F6; }
        .header h2 { font-size: 15px; font-weight: 800; color: var(--text-dark); margin: 0; text-transform: uppercase; }
        .back-btn { font-size: 20px; cursor: pointer; color: var(--text-dark); }
        .content { padding: 25px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .info-card { background: #EEF2FF; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #E0E7FF; font-size: 11px; color: #4338CA; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #636E72; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 16px 20px; border-radius: 18px; border: 2px solid #F1F2F6; font-size: 16px; font-weight: 700; }
        .btn-save { margin-top: auto; width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--primary); color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="header"><div class="back-btn" onclick="window.location.href='detailars.html'">❮</div><h2>Input Hasil Lab</h2></div>
    <div class="content">
        <div class="info-card">Masukkan kadar Hemoglobin (Hb) Anda untuk memperbarui skor risiko anemia secara otomatis.</div>
        <div class="form-group">
            <label>Kadar Hemoglobin (g/dL)</label>
            <input type="number" step="0.1" id="hbValue" placeholder="Contoh: 12.5">
        </div>
        <div class="form-group">
            <label>Tanggal Pemeriksaan</label>
            <input type="date" id="checkDate">
        </div>
        <button class="btn-save" onclick="saveData()">SIMPAN DATA & UPDATE ARS</button>
    </div>
</div>
<script>
    document.getElementById('checkDate').valueAsDate = new Date();

    function saveData() {
        const hb = document.getElementById('hbValue').value;
        const date = document.getElementById('checkDate').value;
        
        if(!hb || hb <= 0) { alert('Masukkan kadar Hb yang valid!'); return; }
        
        // Simpan data
        localStorage.setItem('hayya_last_hb', hb);
        localStorage.setItem('hayya_last_hb_date', date);
        
        alert('✅ Data berhasil disimpan!');
        
        // Navigasi paksa ke halaman detail
        window.location.replace('detailars.html');
    }
</script>
</body>
</html>
