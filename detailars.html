<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAYYA - Anemia Risk Score</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #FF7675; --warning: #FDCB6E; --success: #00B894;
            --white: #ffffff; --text-dark: #2D3436; --text-muted: #636E72;
            --soft-bg: #F8F9FD; --shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #DFE6E9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .phone-frame { width: 375px; height: 780px; background-color: var(--soft-bg); border: 10px solid #2D3436; border-radius: 45px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 55px 25px 20px; background: var(--white); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #F1F2F6; }
        .content { padding: 25px; flex: 1; overflow-y: auto; }

        .gauge-section { background: var(--white); border-radius: 32px; padding: 30px 20px; text-align: center; box-shadow: var(--shadow); margin-bottom: 25px; }
        .gauge-wrapper { position: relative; width: 200px; height: 100px; margin: 0 auto 15px; background: #F1F2F6; border-radius: 100px 100px 0 0; overflow: hidden; }
        .gauge-color { position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg at 50% 100%, var(--success) 0deg 60deg, var(--warning) 60deg 120deg, var(--danger) 120deg 180deg); transform: rotate(-90deg); }
        .gauge-inner { position: absolute; width: 140px; height: 70px; background: var(--white); bottom: 0; left: 30px; border-radius: 70px 70px 0 0; }
        .needle { position: absolute; width: 70px; height: 4px; background: #2D3436; bottom: 0; left: 50%; transform-origin: left center; transition: 1.5s; transform: rotate(-180deg); }

        .var-card { background: var(--white); border-radius: 20px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 5px solid #F1F2F6; }
        .at-risk { border-left-color: var(--danger); }
        .status-badge { font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 10px; background: #F1F2F6; }
        .badge-danger { background: var(--danger); color: white; }

        .btn-lab { width: 100%; padding: 18px; border-radius: 20px; border: none; background: #0984E3; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="header"><div class="back-btn" onclick="window.location.href='dashboard.html'">❮</div><h2>Detail ARS</h2></div>
    <div class="content">
        <div class="gauge-section">
            <div class="gauge-wrapper">
                <div class="gauge-color"></div>
                <div class="gauge-inner"></div>
                <div id="needle" class="needle"></div>
            </div>
            <h1 id="totalScore">0</h1>
            <p id="riskText">Menghitung...</p>
        </div>

        <div class="var-card" id="hbCard">
            <div><span style="font-weight:700; font-size:13px; display:block;">Kadar Hb Terakhir</span><small id="hbDate">Data belum ada</small></div>
            <div class="status-badge" id="hbValue">-- g/dL</div>
        </div>

        <button class="btn-lab" onclick="window.location.href='hasillabab.html'">🧪 UPDATE HASIL LAB</button>
    </div>
</div>

<script>
    window.onload = function() {
        const lastHb = parseFloat(localStorage.getItem('hayya_last_hb')) || 0;
        const lastDate = localStorage.getItem('hayya_last_hb_date') || "Belum ada data";

        // Skor Berdasarkan Kriteria Revisi (Bobot 35%)
        let hbScore = 50; 
        if (lastHb >= 12) hbScore = 100;
        else if (lastHb >= 11) hbScore = 75;
        else if (lastHb >= 10) hbScore = 50;
        else if (lastHb >= 8) hbScore = 25;
        else if (lastHb > 0) hbScore = 0;

        // Simulasi variabel lain (Misal: TTD=50, Haid=80)
        const totalARS = Math.round((hbScore * 0.35) + (50 * 0.25) + (80 * 0.20) + (100 * 0.20));

        // Update UI
        document.getElementById('totalScore').innerText = totalARS;
        document.getElementById('hbValue').innerText = lastHb > 0 ? lastHb + " g/dL" : "BELUM ADA";
        document.getElementById('hbDate').innerText = lastDate;

        const riskText = document.getElementById('riskText');
        if (totalARS >= 70) { riskText.innerText = "⚠️ RISIKO TINGGI"; riskText.style.color = "#FF7675"; }
        else if (totalARS >= 40) { riskText.innerText = "🟡 RISIKO SEDANG"; riskText.style.color = "#FDCB6E"; }
        else { riskText.innerText = "✅ RISIKO RENDAH"; riskText.style.color = "#00B894"; }

        if (lastHb > 0 && lastHb < 12) {
            document.getElementById('hbCard').classList.add('at-risk');
            document.getElementById('hbValue').classList.add('badge-danger');
        }

        // Gerakkan Jarum (-180deg ke 0deg)
        const rotation = -180 + (totalARS * 1.8);
        setTimeout(() => { document.getElementById('needle').style.transform = `rotate(${rotation}deg)`; }, 300);
    };
</script>
</body>
</html>
